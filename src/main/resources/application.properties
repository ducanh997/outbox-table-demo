# ============================================================
# Application
# ============================================================
spring.application.name=outbox-table-demo
server.port=8081
outbox.consumer.name=outbox-table-demo

# ============================================================
# Debezium connector
# ============================================================
debezium.props[name]=outbox-table-demo
debezium.props[connector.class]=io.debezium.connector.mysql.MySqlConnector
debezium.props[topic.prefix]=outbox-table-demo

# ----- Offset & schema history storage -----
debezium.props[offset.storage]=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.props[offset.storage.file.filename]=.debezium/offsets.dat
debezium.props[offset.flush.interval.ms]=100
debezium.props[schema.history.internal]=io.debezium.storage.file.history.FileSchemaHistory
debezium.props[schema.history.internal.file.filename]=.debezium/schema-history.dat

# ----- Snapshot -----
debezium.props[snapshot.mode]=schema_only

# ----- MySQL connection -----
debezium.props[database.hostname]=localhost
debezium.props[database.port]=3306
debezium.props[database.user]=ducanh
debezium.props[database.password]=Outbox@2026!Dev
debezium.props[database.server.id]=184055

# ----- Captured tables -----
debezium.props[database.include.list]=obt
debezium.props[table.include.list]=obt.outbox_innodb,obt.outbox_blackhole

# ============================================================
# Actuator / Micrometer
# ============================================================
management.endpoints.web.exposure.include=prometheus,info,metrics
management.metrics.tags.application=outbox-table-demo
